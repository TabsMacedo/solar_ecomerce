<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar — Contato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/contact.css">
</head>

<body class="bg-primary">

  <!-- ═══════════ CABEÇALHO ═══════════ -->
  <header class="site-header navbar">
    <a href="./index.html" class="site-logo navbar-brand" aria-label="Solar — Página inicial">
      <svg class="navbar-brand-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="5" fill="#fff"/>
        <g stroke="#fff" stroke-width="2" stroke-linecap="round">
          <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.9" y1="4.9" x2="7" y2="7"/><line x1="17" y1="17" x2="19.1" y2="19.1"/>
          <line x1="19.1" y1="4.9" x2="17" y2="7"/><line x1="7" y1="17" x2="4.9" y2="19.1"/>
        </g>
      </svg>
      <span class="navbar-logo">Solar</span>
    </a>

    <ul class="navbar-nav" role="list">
      <li><a class="nav-link navbar-home"          href="./index.html">Home</a></li>
      <li><a class="nav-link navbar-about"         href="./about-us.html">Sobre</a></li>
      <li><a class="nav-link active navbar-contact" href="./contact.html">Contato</a></li>
    </ul>

    <div class="navbar-actions flex-center flex-gap-4">
      <a class="navbar-buy" href="./orders.html" aria-label="Carrinho de compras">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 4h2l2.4 12.3a1.5 1.5 0 0 0 1.5 1.2h8.2a1.5 1.5 0 0 0 1.5-1.2L21 8H6"
                stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="9.5" cy="20.5" r="1.3" fill="currentColor"/>
          <circle cx="17.5" cy="20.5" r="1.3" fill="currentColor"/>
        </svg>
      </a>
      <form class="navbar-search-wrapper flex-center flex-gap-2" action="./search.html" role="search">
        <input class="search-bar navbar-search" type="search" name="q"
               placeholder="Pesquisar produtos..." aria-label="Pesquisar produtos">
        <button class="button-search btn btn-primary" type="submit" aria-label="Buscar">
          <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <circle cx="8" cy="8" r="5.5" stroke="#fff" stroke-width="1.6"/>
            <line x1="12.5" y1="12.5" x2="15.5" y2="15.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </form>
      <a class="btn navbar-login" href="./register.html">Entrar</a>
    </div>
  </header>


  <!-- ═══════════ CONTATO ═══════════ -->
  <main class="contact bg-primary">
    <div class="container-narrow">

      <h1 class="contact-title">Contato</h1>

      <div class="contact-grid">

        <div class="contact-card">
          <span class="contact-card__icon">
            <svg viewBox="0 0 14 14" width="16" height="16" fill="none" aria-hidden="true">
              <path d="M7 1C4.8 1 3 2.8 3 5c0 3 4 8 4 8s4-5 4-8c0-2.2-1.8-4-4-4z" stroke="currentColor" stroke-width="1.2"/>
              <circle cx="7" cy="5" r="1.2" fill="currentColor"/>
            </svg>
          </span>
          <div>
            <p class="contact-card__label">Endereço</p>
            <p class="contact-card__value">Av. das Estrelas, 123 — Centro, São Paulo/SP</p>
          </div>
        </div>

        <div class="contact-card">
          <span class="contact-card__icon">
            <svg viewBox="0 0 14 14" width="16" height="16" fill="none" aria-hidden="true">
              <rect x="1" y="3" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
              <path d="M1 4l6 4 6-4" stroke="currentColor" stroke-width="1.2"/>
            </svg>
          </span>
          <div>
            <p class="contact-card__label">E-mail</p>
            <p class="contact-card__value"><a href="mailto:contato@solar.com.br">contato@solar.com.br</a></p>
          </div>
        </div>

        <div class="contact-card">
          <span class="contact-card__icon">
            <svg viewBox="0 0 14 14" width="16" height="16" fill="none" aria-hidden="true">
              <rect x="3" y="1" width="8" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
              <circle cx="7" cy="10.5" r="0.8" fill="currentColor"/>
            </svg>
          </span>
          <div>
            <p class="contact-card__label">Telefone</p>
            <p class="contact-card__value">(11) 9 9999-0000</p>
          </div>
        </div>

        <div class="contact-card contact-card--amber">
          <span class="contact-card__icon">
            <svg viewBox="0 0 14 14" width="16" height="16" fill="none" aria-hidden="true">
              <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/>
              <path d="M7 4v3.5l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </span>
          <div>
            <p class="contact-card__label contact-card__label--amber">Horário</p>
            <p class="contact-card__value">Seg–Sex, 09h–18h</p>
          </div>
        </div>

      </div>

      <!-- Formulário de mensagem -->
      <form class="contact-form">
        <div class="form-group">
          <label class="form-label" for="c-nome">Nome</label>
          <input class="form-input" id="c-nome" type="text" placeholder="Seu nome">
        </div>
        <div class="form-group">
          <label class="form-label" for="c-email">E-mail</label>
          <input class="form-input" id="c-email" type="email" placeholder="voce@email.com">
        </div>
        <div class="form-group">
          <label class="form-label" for="c-msg">Mensagem</label>
          <textarea class="form-input form-textarea" id="c-msg" placeholder="Como podemos ajudar?"></textarea>
        </div>
        <div class="contact-actions">
          <button class="btn btn-primary contact-save" type="submit">Salvar</button>
        </div>
      </form>

    </div>
  </main>


  <!-- ═══════════ RODAPÉ ═══════════ -->
  <footer class="site-footer bg-deep">
    <div class="container">
      <hr class="divider footer-divider">
      <div class="footer-content flex-between">
        <span class="site-logo footer-logo">Solar</span>
        <nav class="footer-nav flex-center flex-gap-6" aria-label="Links do rodapé">
          <a class="nav-link footer-link" href="./about-us.html">Sobre Nós</a>
          <a class="nav-link footer-link" href="./contact.html">Contato</a>
          <a class="nav-link footer-link" href="#">Privacidade</a>
        </nav>
        <p class="text-muted footer-copy">&copy; 2025 Solar. Todos os direitos reservados.</p>
      </div>
    </div>
  </footer>

</body>
</html>
