<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar — Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/register.css">
</head>

<body class="bg-primary">

  <!-- ═══════════ CABEÇALHO (reduzido) ═══════════ -->
  <header class="site-header navbar navbar--minimal">
    <a href="./index.html" class="site-logo navbar-brand" aria-label="Solar — Página inicial">
      <svg class="navbar-brand-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="5" fill="#fff"/>
        <g stroke="#fff" stroke-width="2" stroke-linecap="round">
          <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.9" y1="4.9" x2="7" y2="7"/><line x1="17" y1="17" x2="19.1" y2="19.1"/>
          <line x1="19.1" y1="4.9" x2="17" y2="7"/><line x1="7" y1="17" x2="4.9" y2="19.1"/>
        </g>
      </svg>
      <span class="navbar-logo">Solar</span>
    </a>
    <a class="navbar-buy" href="./orders.html" aria-label="Carrinho de compras">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M3 4h2l2.4 12.3a1.5 1.5 0 0 0 1.5 1.2h8.2a1.5 1.5 0 0 0 1.5-1.2L21 8H6"
              stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="9.5" cy="20.5" r="1.3" fill="currentColor"/>
        <circle cx="17.5" cy="20.5" r="1.3" fill="currentColor"/>
      </svg>
    </a>
  </header>


  <!-- ═══════════ CADASTRO ═══════════ -->
  <main class="register">
    <section class="register-card card-elevated">
      <h1 class="register-title">Cadastro</h1>

      <form class="register-form">
        <div class="form-group">
          <label class="form-label" for="nome">Nome Completo</label>
          <input class="form-input" id="nome" name="nome" type="text" placeholder="Seu nome completo" autocomplete="name">
        </div>

        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input class="form-input" id="email" name="email" type="email" placeholder="voce@email.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="senha">Senha</label>
          <input class="form-input" id="senha" name="senha" type="password" placeholder="••••••••" autocomplete="new-password">
        </div>

        <button class="btn btn-primary register-submit" type="submit">Cadastrar</button>
      </form>

      <p class="register-foot">
        Já tem conta? <a href="./index.html">Entrar</a>
      </p>
    </section>
  </main>


  <!-- ═══════════ RODAPÉ ═══════════ -->
  <footer class="site-footer bg-deep">
    <div class="container">
      <hr class="divider footer-divider">
      <div class="footer-content flex-between">
        <span class="site-logo footer-logo">Solar</span>
        <nav class="footer-nav flex-center flex-gap-6" aria-label="Links do rodapé">
          <a class="nav-link footer-link" href="./about-us.html">Sobre Nós</a>
          <a class="nav-link footer-link" href="./contact.html">Contato</a>
          <a class="nav-link footer-link" href="#">Privacidade</a>
        </nav>
        <p class="text-muted footer-copy">&copy; 2025 Solar. Todos os direitos reservados.</p>
      </div>
    </div>
  </footer>

</body>
</html>
